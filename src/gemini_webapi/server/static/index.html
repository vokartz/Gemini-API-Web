<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Görsel Üretimi · Gemini Panel</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <main>
    <div class="page-title">
      <h1>Görsel Üretimi</h1>
      <p>Gemini ile filigransız görsel üret; PNG + JPG olarak CDN'e yüklenir, sonuç anlık akışla gelir.</p>
    </div>

    <div class="grid-2">
      <div class="panel">
        <div class="panel-head"><h2>Üretim</h2></div>
        <div class="panel-body stack">
          <label>Açıklama (prompt)
            <textarea id="prompt" placeholder="Üretmek istediğiniz görseli açıklayın…"></textarea>
          </label>
          <div class="split">
            <label>Model
              <select id="model">
                <option value="gemini">gemini (3.1 Pro)</option>
                <option value="gemini-3.1-pro">gemini-3.1-pro</option>
                <option value="gemini-3.5-flash">gemini-3.5-flash</option>
                <option value="gemini-3.1-flash-lite">gemini-3.1-flash-lite</option>
              </select>
            </label>
            <label>En-boy oranı
              <select id="aspectRatio">
                <option value="">Varsayılan (1:1)</option>
                <option value="1:1">1:1 · Kare</option>
                <option value="16:9">16:9 · Yatay</option>
                <option value="9:16">9:16 · Dikey</option>
              </select>
            </label>
          </div>
          <div class="split">
            <label>Çıktı formatı
              <select id="outputFormat">
                <option value="png">PNG</option>
                <option value="jpg">JPG</option>
              </select>
            </label>
            <label>Gem
              <select id="gem"><option value="">Gem kullanma</option></select>
            </label>
          </div>
          <button id="generateBtn" class="primary">Görsel Üret</button>
          <div class="hint" id="genStatus"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head"><h2>Sonuç</h2></div>
        <div class="panel-body">
          <div id="preview" class="preview-empty">Üretilen görsel burada görünecek.</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <h2>Son Üretilenler</h2>
        <button id="refreshMediaBtn" class="small">Yenile</button>
      </div>
      <div class="panel-body">
        <div id="mediaList" class="preview"></div>
      </div>
    </div>
  </main>

  <script src="/static/app.js"></script>
  <script>
    async function init() {
      await loadGemOptions();
      await refreshMedia();
      $("generateBtn").onclick = onGenerate;
      $("refreshMediaBtn").onclick = () => refreshMedia().catch((e) => toast(e.message, true));
    }

    async function loadGemOptions() {
      const gems = await loadGems();
      const def = gems.find((g) => g.is_default);
      const opts = gems.map((g) => `<option value="${esc(g.id)}">${esc(g.name)}${g.is_default ? " ⭐" : ""}</option>`).join("");
      $("gem").innerHTML = `<option value="">Gem kullanma${def ? ` (varsayılan: ${esc(def.name)})` : ""}</option>` + opts;
    }

    function renderImages(target, images) {
      const el = $(target);
      if (!images || !images.length) {
        el.className = "preview-empty";
        el.textContent = "Üretim sonucu görsel döndürmedi.";
        return;
      }
      el.className = "preview";
      el.innerHTML = images.map((img, i) => {
        const main = img.url || img.png_url || img.jpg_url;
        const links = [];
        if (img.png_url) links.push(`<a href="${esc(img.png_url)}" target="_blank">PNG</a>`);
        if (img.jpg_url) links.push(`<a href="${esc(img.jpg_url)}" target="_blank">JPG</a>`);
        return `<div class="item">
          <img src="${esc(main)}" alt="görsel ${i + 1}">
          <div class="row hint" style="justify-content:center">${links.join(" · ")}</div>
        </div>`;
      }).join("");
    }

    // /v1/generate SSE akışını çözer.
    async function streamGenerate(payload, handlers) {
      const res = await fetch("/v1/generate", {
        method: "POST",
        headers: authHeaders({ "Content-Type": "application/json" }),
        body: JSON.stringify(payload),
      });
      if (!res.ok || !res.body) {
        let detail = `HTTP ${res.status}`;
        try { detail = (await res.json()).detail || detail; } catch (e) {}
        throw new Error(detail);
      }
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const blocks = buffer.split("\n\n");
        buffer = blocks.pop() || "";
        for (const block of blocks) {
          let event = "message";
          const dataLines = [];
          for (const line of block.split("\n")) {
            if (line.startsWith("event:")) event = line.slice(6).trim();
            else if (line.startsWith("data:")) dataLines.push(line.slice(5).trim());
          }
          if (!dataLines.length) continue;
          let data = {};
          try { data = JSON.parse(dataLines.join("\n")); } catch (e) { continue; }
          (handlers[event] || (() => {}))(data);
        }
      }
    }

    async function onGenerate(event) {
      const btn = event.currentTarget;
      const prompt = $("prompt").value.trim();
      if (!prompt) return toast("Lütfen bir açıklama girin", true);
      btn.disabled = true;
      $("genStatus").innerHTML = `<span class="spinner"></span> Üretiliyor…`;
      $("preview").className = "preview-empty";
      $("preview").innerHTML = `<span class="spinner"></span>`;
      const payload = {
        prompt,
        model: $("model").value,
        mode: "image",
        aspect_ratio: $("aspectRatio").value || null,
        output_format: $("outputFormat").value,
        gem_id: $("gem").value || null,
        temporary: true,
        store_media: true,
      };
      let streamError = null;
      try {
        await streamGenerate(payload, {
          status: () => { $("genStatus").innerHTML = `<span class="spinner"></span> Görsel oluşturuluyor…`; },
          result: (data) => { renderImages("preview", data.images); $("genStatus").textContent = "Tamamlandı."; },
          error: (data) => { streamError = data.detail || "Üretim hatası"; },
        });
        if (streamError) throw new Error(streamError);
        await refreshMedia();
      } catch (e) {
        $("preview").className = "preview-empty";
        $("preview").textContent = "Üretim başarısız.";
        $("genStatus").textContent = "";
        toast(e.message, true);
      } finally {
        btn.disabled = false;
      }
    }

    async function refreshMedia() {
      const data = await api("/v1/gemini/media?kind=image&limit=24");
      const items = (data.media || []).map((m) => ({
        url: m.content_url || m.url,
        png_url: m.content_url || m.url,
      }));
      if (!items.length) {
        $("mediaList").className = "preview-empty";
        $("mediaList").textContent = "Henüz üretilmiş görsel yok.";
        return;
      }
      renderImages("mediaList", items);
    }

    bootstrap(init);
  </script>
</body>
</html>
